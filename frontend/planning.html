<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon planning — Tournoi R92</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;600&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="conteneur">

    <header class="entete">
      <div class="sous-titre">Génération R92</div>
      <h1>Mon planning</h1>
    </header>

    <main>
      <section class="carte">
        <label class="mp-label" for="select-equipe">Choisis ton équipe :</label>
        <select id="select-equipe" class="r-input">
          <option value="">— Chargement… —</option>
        </select>
        <!-- Les matchs de l'équipe choisie, injectés par planning.js -->
        <div id="mon-planning">
          <p class="vide">Sélectionne ton équipe pour voir tes matchs.</p>
        </div>
      </section>
    </main>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/planning.js"></script>

</body>
</html>
