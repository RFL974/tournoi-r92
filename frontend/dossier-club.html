<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dossier club — Tournoi R92</title>
  <meta name="description" content="Dossier récapitulatif du tournoi Génération R92 pour les clubs invités : infos pratiques, programme, format sportif, sécurité et contacts.">
  <!-- Pas d'indexation : document destiné aux clubs invités, pas au grand public. -->
  <meta name="robots" content="noindex">

  <!-- Polices de la charte (mêmes familles que le reste du site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;600&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

  <!-- Feuille de style DÉDIÉE : fond blanc, texte sombre, pensée pour l'impression A4
       (contrairement aux autres pages, sombres et pensées pour l'écran). -->
  <link rel="stylesheet" href="css/dossier.css">
</head>
<body>

  <!-- Bandeau d'outils (jamais imprimé) : retour admin + export PDF -->
  <div class="barre-outils no-print">
    <a class="btn-outil" href="admin.html">← Retour à l'administration</a>
    <span class="barre-outils-titre">Dossier club — aperçu avant envoi</span>
    <button type="button" class="btn-outil btn-principal" id="bouton-imprimer">🖨️ Exporter en PDF</button>
  </div>

  <!-- Le dossier lui-même, entièrement construit par js/dossier.js à partir des
       données du tournoi (Config Zone A + Zone B). Toute section sans donnée
       est masquée entièrement — pas de « non communiqué ». -->
  <main class="feuille" id="dossier">
    <div class="message-chargement" id="message-dossier">Chargement du dossier…</div>
  </main>

  <!-- Ordre de chargement identique aux autres pages :
       1) config.js (URL du backend) · 2) commun.js (helpers purs) · 3) api.js (apiGet)
       4) vendor/qrcode.js (générateur de QR code local, MIT — aucun appel externe)
       5) dossier.js (construit la page) -->
  <script src="js/config.js"></script>
  <script src="js/commun.js"></script>
  <script src="js/api.js"></script>
  <script src="js/vendor/qrcode.js"></script>
  <script src="js/dossier.js"></script>

</body>
</html>
