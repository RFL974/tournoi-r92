<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le tournoi — Génération R92</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;600&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!--
    PAGE PUBLIQUE UNIQUE. Deux onglets : « Mon équipe » (matchs + classements d'une équipe)
    et « Classements » (derniers scores du tournoi + poules + niveaux croisés). Un seul appel
    réseau (getAll) et un seul rafraîchissement auto alimentent les 2 vues. Lecture seule.
  -->
  <div class="conteneur">

    <header class="entete">
      <div class="sous-titre">Génération R92</div>
      <h1>Le tournoi</h1>
    </header>

    <main>
      <section class="carte">
        <!-- Écran « à venir » : affiché tant que le tournoi n'est pas publié depuis l'admin. -->
        <div id="tournoi-avenir" hidden>
          <div class="avenir">
            <div class="avenir-emoji">🏉</div>
            <h2 class="avenir-titre">Le tournoi arrive bientôt</h2>
            <p class="avenir-texte">Les poules, le planning et les scores en direct s'afficheront ici
              dès l'ouverture du tournoi. Reviens un peu plus tard !</p>
          </div>
        </div>

        <!-- Bandeau de don. TODO : remplacer le href="#" par l'URL HelloAsso réelle du club. -->
        <a class="don-bandeau" id="don-lien" href="#" target="_blank" rel="noopener">
          💛 Soutiens l'école de rugby — <strong>faire un don</strong>
        </a>

        <div class="live-barre">
          <button id="btn-refresh" class="bouton">🔄 Rafraîchir</button>
          <span id="maj" class="live-maj"></span>
        </div>

        <!-- Barre d'onglets (segmenté). « Mon équipe » est l'onglet par défaut. -->
        <div class="onglets" role="tablist">
          <button class="onglet actif" data-onglet="equipe">📋 Mon équipe</button>
          <button class="onglet" data-onglet="classements">🏆 Classements</button>
        </div>

        <!-- Filtre catégorie GLOBAL : pilote les deux onglets. Masqué s'il n'y a qu'une catégorie. -->
        <div id="filtre-categorie" class="mp-filtre" hidden>
          <label class="mp-label" for="select-categorie">Choisis ta catégorie :</label>
          <select id="select-categorie" class="r-input"></select>
        </div>

        <div id="vues">
          <!-- 📋 Mon équipe : sélecteur + matchs + classements de l'équipe -->
          <div id="vue-equipe">
            <label class="mp-label" for="select-equipe">Choisis ton équipe :</label>
            <select id="select-equipe" class="r-input">
              <option value="">— Chargement… —</option>
            </select>
            <div id="mon-planning">
              <p class="vide">Sélectionne ton équipe pour voir tes matchs.</p>
            </div>
          </div>

          <!-- 🏆 Classements : derniers scores + poules (matin) + niveaux croisés (après-midi) -->
          <div id="vue-classements" hidden>
            <div class="message">Chargement des classements…</div>
          </div>
        </div>
      </section>
    </main>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/tournoi.js"></script>

</body>
</html>
