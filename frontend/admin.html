<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- "viewport" = indispensable pour un affichage correct sur téléphone (mobile-first) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration — Tournoi R92</title>

  <!-- Polices de la charte (Bebas Neue, Barlow Condensed, Barlow) via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@500;600&family=Barlow:wght@400;600&display=swap" rel="stylesheet">

  <!-- Notre feuille de style commune -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="conteneur">

    <header class="entete">
      <div class="sous-titre">Génération R92</div>
      <h1>Administration du tournoi</h1>
    </header>

    <main>

      <!-- 1) Les réglages (horaires + catégories), injectés par admin.js -->
      <section id="reglages">
        <div class="message">Chargement des réglages…</div>
      </section>

      <!-- 2) La saisie des équipes -->
      <section class="carte" id="bloc-equipes">
        <h2>Équipes</h2>

        <!-- Formulaire d'ajout : nom + catégorie -->
        <form id="form-equipe" class="form-equipe">
          <input id="champ-nom" type="text" placeholder="Nom de l'équipe" autocomplete="off" required>
          <select id="champ-categorie" required>
            <option value="">Catégorie…</option>
          </select>
          <button type="submit" class="bouton" id="bouton-ajouter">Ajouter</button>
        </form>

        <!-- Message de retour (succès / erreur) -->
        <div id="message-equipe" class="message-form"></div>

        <!-- La liste des équipes, groupée par catégorie -->
        <div id="liste-equipes"></div>
      </section>

      <!-- 3) Génération des poules et du planning -->
      <section class="carte" id="bloc-generation">
        <h2>Poules &amp; planning</h2>
        <p class="note-generation">
          Répartit les équipes en poules et calcule tous les horaires sans conflit.<br>
          ⚠️ Cela <strong>efface</strong> les poules, matchs et scores précédents.
        </p>
        <button id="bouton-generer" class="bouton">🎲 Générer poules et planning</button>
        <div id="message-generation" class="message-form"></div>
        <div id="arbitrages"></div>
        <div id="affichage-planning"></div>
      </section>

    </main>

  </div>

  <!-- On charge les scripts DANS CET ORDRE :
       1) config.js  → définit l'URL du backend
       2) api.js     → fournit apiGet()
       3) admin.js   → utilise les deux pour afficher la page -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
