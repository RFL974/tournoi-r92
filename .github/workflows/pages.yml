name: Déploiement GitHub Pages (dossier frontend)

# Publie le contenu de `frontend/` sur GitHub Pages à chaque push sur main
# (URLs : https://rfl974.github.io/tournoi-r92/tournoi.html, /admin.html, …).

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empaqueter le dossier frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
